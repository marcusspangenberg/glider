name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux
            preset: linux-release
          - os: windows-latest
            name: windows
            preset: windows-release
          - os: macos-latest
            name: macos
            preset: macos-release

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-binary-cache
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          ref: 256acc64012b23a13041d8705805e1f23b43a024

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.name }}-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('triplets/**') }}
          restore-keys: vcpkg-${{ matrix.name }}-

      - name: Create vcpkg binary cache dir
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"
        shell: bash

      - name: Bootstrap vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y autoconf-archive libltdl-dev \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libgl-dev libegl-dev \
            libdbus-1-dev libudev-dev

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Stage artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir artifact
          cp -r build/Glider.app build/GliderEditor.app artifact/

      - name: Stage artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir artifact
          cp build/glider build/glidereditor artifact/
          cp -r build/fonts build/sounds build/images artifact/
          cp "build/The House" "build/The House 2" artifact/

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir artifact
          copy build\Release\glider.exe artifact\
          copy build\Release\glidereditor.exe artifact\
          xcopy /E /I build\fonts artifact\fonts
          xcopy /E /I build\sounds artifact\sounds
          xcopy /E /I build\images artifact\images
          copy "build\The House" artifact\
          copy "build\The House 2" artifact\

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0"; fi
          cd artifact
          ditto -c -k --sequesterRsrc . ../glider-macos-${VERSION}.zip
          cd ..
          mv glider-macos-${VERSION}.zip artifact/

      - name: Archive artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0"; fi
          mv artifact glider-ubuntu24-${VERSION}
          tar -czf glider-ubuntu24-${VERSION}.tar.gz glider-ubuntu24-${VERSION}/
          mkdir artifact
          mv glider-ubuntu24-${VERSION}.tar.gz artifact/

      - name: Create deb package (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0"
          fi
          DEB_DIR=glider-deb
          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/opt/glider"
          mkdir -p "$DEB_DIR/usr/local/bin"
          cp -r glider-ubuntu24-${VERSION}/. "$DEB_DIR/opt/glider/"
          cat > "$DEB_DIR/DEBIAN/control" << EOF
          Package: glider
          Version: $VERSION
          Architecture: amd64
          Maintainer: Marcus Spangenberg <marcus.spangenberg@gmail.com>
          Description: Glider 4 reimplementation
           A reimplementation of the classic Mac game Glider 4 that reads
           original Mac house data files and recreates the gameplay.
          EOF
          ln -s /opt/glider/glider "$DEB_DIR/usr/local/bin/glider"
          ln -s /opt/glider/glidereditor "$DEB_DIR/usr/local/bin/glidereditor"
          dpkg-deb --build --root-owner-group "$DEB_DIR" artifact/glider-ubuntu24-${VERSION}.deb

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") { $VERSION = $env:GITHUB_REF_NAME -replace '^v', '' } else { $VERSION = "0.0.0" }
          cd artifact
          Compress-Archive -Path * -DestinationPath "..\glider-win-$VERSION.zip"
          cd ..
          Move-Item "glider-win-$VERSION.zip" artifact\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glider-${{ matrix.name }}
          path: artifact/glider-*${{ runner.os == 'Linux' && '.tar.gz' || '.zip' }}

      - name: Upload deb artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: glider-ubuntu24-deb
          path: artifact/glider-ubuntu24-*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/glider-macos-*.zip
            artifacts/glider-ubuntu24-*.tar.gz
            artifacts/glider-ubuntu24-*.deb
            artifacts/glider-win-*.zip
