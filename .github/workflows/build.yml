name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux
            extra-cmake: ""
          - os: windows-latest
            name: windows
            extra-cmake: -DVCPKG_TARGET_TRIPLET=x64-windows-static -DVCPKG_APPLOCAL_DEPS=OFF
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-binary-cache

    steps:
      - uses: actions/checkout@v4

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          ref: 256acc64012b23a13041d8705805e1f23b43a024

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.name }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.name }}-

      - name: Create vcpkg binary cache dir
        run: mkdir -p "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}"
        shell: bash

      - name: Bootstrap vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y autoconf-archive libltdl-dev

      - name: Configure (non-macOS)
        if: runner.os != 'macOS'
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          ${{ matrix.extra-cmake }}
          .

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-osx-static \
            "-DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/triplets" \
            .

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir artifact
          cp -r build/Glider.app build/GliderEditor.app artifact/

      - name: Stage artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir artifact
          cp build/glider build/glidereditor artifact/
          cp -r build/fonts build/sounds build/images artifact/
          cp "build/The House" "build/The House 2" artifact/

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir artifact
          copy build\Release\glider.exe artifact\
          copy build\Release\glidereditor.exe artifact\
          xcopy /E /I build\fonts artifact\fonts
          xcopy /E /I build\sounds artifact\sounds
          xcopy /E /I build\images artifact\images
          copy "build\The House" artifact\
          copy "build\The House 2" artifact\

      - name: Sign and notarize (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "Skipping signing: APPLE_CERTIFICATE secret not set"
            exit 0
          fi
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "temp" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "temp" $KEYCHAIN
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN
          for APP in artifact/Glider.app artifact/GliderEditor.app; do
            codesign --force --deep \
              --sign "Developer ID Application: $APPLE_TEAM_ID" \
              --entitlements macos/entitlements.plist \
              --options runtime "$APP"
          done
          ditto -c -k --sequesterRsrc --keepParent \
            artifact/Glider.app /tmp/notarize.zip
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple artifact/Glider.app artifact/GliderEditor.app

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd artifact
          ditto -c -k --sequesterRsrc . ../glider-macos.zip
          cd ..
          mv glider-macos.zip artifact/

      - name: Archive artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mv artifact glider-linux
          tar -czf glider-linux.tar.gz glider-linux/
          mkdir artifact
          mv glider-linux.tar.gz artifact/

      - name: Create deb package (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0"
          fi
          DEB_DIR=glider-deb
          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/opt/glider"
          mkdir -p "$DEB_DIR/usr/local/bin"
          cp -r glider-linux/. "$DEB_DIR/opt/glider/"
          cat > "$DEB_DIR/DEBIAN/control" << EOF
          Package: glider
          Version: $VERSION
          Architecture: amd64
          Maintainer: Marcus Spangenberg <marcus.spangenberg@gmail.com>
          Description: Glider 4 reimplementation
           A reimplementation of the classic Mac game Glider 4 that reads
           original Mac house data files and recreates the gameplay.
          EOF
          ln -s /opt/glider/glider "$DEB_DIR/usr/local/bin/glider"
          ln -s /opt/glider/glidereditor "$DEB_DIR/usr/local/bin/glidereditor"
          dpkg-deb --build --root-owner-group "$DEB_DIR" artifact/glider-linux.deb

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd artifact
          Compress-Archive -Path * -DestinationPath ..\glider-windows.zip
          cd ..
          Move-Item glider-windows.zip artifact\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glider-${{ matrix.name }}
          path: artifact/glider-${{ matrix.name }}${{ runner.os == 'Linux' && '.tar.gz' || '.zip' }}

      - name: Upload deb artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: glider-linux-deb
          path: artifact/glider-linux.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/glider-macos.zip
            artifacts/glider-linux.tar.gz
            artifacts/glider-linux.deb
            artifacts/glider-windows.zip
